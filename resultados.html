<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Resultados da busca | MovieHub</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Mesmas cores da página inicial -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#e50914",
                        background: "#09090b",
                        surface: "#18181b"
                    }
                }
            }
        };
    </script>
</head>

<body class="min-h-screen bg-background text-white">

    <!-- Cabeçalho -->
    <header
        class="sticky top-0 z-50 border-b border-white/10 bg-background/90 backdrop-blur-md">

        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">

            <a href="index.html"
                class="text-2xl font-black tracking-tight text-primary">
                MovieHub
            </a>

            <a href="index.html"
                class="rounded-lg border border-white/10 px-4 py-2 text-sm font-semibold text-zinc-300 transition hover:border-primary hover:text-primary">
                ← Voltar para busca
            </a>

        </div>

    </header>

    <!-- Conteúdo -->
    <main class="mx-auto max-w-7xl px-6 py-12">

        <!-- Título -->
        <section class="mb-10">

            <span class="text-sm font-bold uppercase tracking-widest text-primary">
                Pesquisa
            </span>

            <h1
                id="search-title"
                class="mt-2 text-3xl font-black sm:text-4xl">
            </h1>

            <p class="mt-3 text-zinc-400">
                Confira os filmes encontrados para sua pesquisa.
            </p>

        </section>

        <!-- Resultados -->
        <section>

            <div
                id="results"
                class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
            </div>

        </section>

    </main>

    <script type="module" src="./js/results.js"></script>

</body>

</html>
